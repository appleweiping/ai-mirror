<!DOCTYPE html>
<html lang="zh" data-theme="openai" data-mode="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>AI Mirror — 免费多模型 AI</title>
  <meta name="description" content="Free multi-model AI chat: ChatGPT, Gemini, Claude, DeepSeek, Qwen, GLM, Kimi, MiniMax, Doubao, ERNIE. One place, brand-matched UI, deployed on Vercel." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%2310a37f'/><text x='50' y='68' font-size='58' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'>✦</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="themes.css" />
</head>
<body>
  <header>
    <div class="brand">
      <div class="glyph" id="brandGlyph">✦</div>
      <div>
        <div id="brandName">AI Mirror</div>
        <div class="sub" id="tagline">免费多模型 AI 镜像</div>
      </div>
    </div>
    <div class="spacer"></div>
    <select class="ctrl" id="langSel" aria-label="language"></select>
    <button class="ctrl" id="modeBtn" aria-label="toggle dark mode">🌙</button>
    <button class="ctrl" id="settingsBtn">⚙ <span id="settingsLabel">设置</span></button>
    <button class="ctrl" id="clearBtn" title="clear">🗑</button>
  </header>

  <nav class="models" id="modelPills"></nav>

  <main id="main">
    <div class="thread" id="thread">
      <div class="welcome" id="welcome">
        <div class="hero" id="welcomeHero">✦</div>
        <h1 id="welcomeTitle">选个模型，开始聊天</h1>
        <p id="welcomeBody"></p>
      </div>
    </div>
  </main>

  <footer>
    <div class="composer">
      <textarea id="input" rows="1" placeholder=""></textarea>
      <button class="send" id="sendBtn" disabled>↑</button>
    </div>
    <div class="foot-note" id="footNote"></div>
  </footer>

  <!-- settings modal -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <h2 id="mTitle">设置</h2>
      <p class="desc" id="mDesc"></p>
      <div id="keyFields"></div>
      <p class="note-warn" id="mWarn"></p>
      <div class="modal-actions">
        <button class="btn ghost" id="mCancel">取消</button>
        <button class="btn primary" id="mSave">保存</button>
      </div>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
